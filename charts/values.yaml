# Global configuration for the application
global: 
  domain: testnet.verana.network # Domain for the application

# General configuration
name: idx
replicas: 1 # Number of replicas for the Indexer service

# Image configuration
image:
  repository: veranalabs/verana-indexer
  # Tag defaults to Chart.Version if not specified
  tag: ""
  pullPolicy: IfNotPresent

# Ports
apiPort: 3001

# Resource limits for the main indexer container
# These limits help prevent MemoryPressure pod evictions
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

# Node.js memory settings (should be ~75% of memory limit)
nodeOptions: "--max-old-space-size=3072"

# DB and Redis configuration
database:
  enabled: true
  host: localhost
  user: verana_testnet1
  # pwd: use a plain-text password OR leave empty and use pwdSecret instead
  # If both are set, pwd takes precedence.
  pwd: pass
  # pwdSecret: reference an existing Kubernetes Secret for the DB password
  # Example:
  #   pwdSecret:
  #     name: my-db-secret
  #     key: password
  pwdSecret: {}
  db: verana_testnet1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 10Gi
    storageClassName: csi-cinder-classic

redis: 
  enabled: true
  host: localhost
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Enable cors for the Indexer
ingress:
  host: "{{ .Values.name }}.{{ .Values.global.domain }}"
  tlsSecret: public.{{ .Values.name }}.{{ .Values.global.domain }}-cert
  public:
    enableCors: true
  private:
    enableCors: true
    whitelistSourceRange: "" # e.g. "xxx.xx.xxx.xxx/32"
    tlsSecret: "private.{{ .Values.name }}.{{ .Values.global.domain }}-cert"
    host: ""

# Extra environment variables for the indexer container.
# Accepts any valid Kubernetes env entry (value, valueFrom, secretKeyRef, etc.)
# Examples:
#   extraEnv:
#     - name: MY_VAR
#       value: "my-value"
#     - name: MY_SECRET
#       valueFrom:
#         secretKeyRef:
#           name: my-secret
#           key: my-key
#     - name: MY_CONFIGMAP_VAR
#       valueFrom:
#         configMapKeyRef:
#           name: my-configmap
#           key: my-key
extraEnv: []

# Persistent volume configuration for app
storage:
  size: 1Gi
  storageClassName: csi-cinder-high-speed
