name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      notify_tag:
        description: "Release tag to (re)announce on Discord, e.g. v1.2.0"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release PR
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Setup Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5

      - name: Setup node v22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Corepack pnpm
        run: |
          corepack enable
          
      - name: Install dependencies
        run: |
          pnpm install

      - name: Docker login
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build & push stable Docker images
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-indexer:latest
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-indexer:${{ needs.release-please.outputs.tag_name }}

      - name: Log in to Docker Hub Helm Registry
        run: |
          echo "${{ secrets.DOCKER_HUB_PWD }}" | helm registry login -u "${{ secrets.DOCKER_HUB_LOGIN }}" --password-stdin docker.io

      - name: Push Helm chart to Docker Hub OCI repo
        run: |
          CHART_NAME=$(grep '^name:' ./charts/Chart.yaml | awk '{print $2}')
          helm dependency update ./charts
          helm package ./charts --version ${{ needs.release-please.outputs.tag_name }} -d ./charts
          helm push ./charts/$CHART_NAME-${{ needs.release-please.outputs.tag_name }}.tgz oci://docker.io/"${{ secrets.DOCKER_HUB_LOGIN }}"

      - name: Publish Summary
        run: |
          echo "Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:latest" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Helm Charts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY

  discord-notify:
    needs: [release-please, docker-release]
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: read
    uses: 2060-io/organization/.github/workflows/discord-release-notify-call.yml@5f813454d8962db006c4e4466f3af1cf4af8dfa4 # main
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets:
      DISCORD_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}

  discord-notify-manual:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: 2060-io/organization/.github/workflows/discord-release-notify-call.yml@5f813454d8962db006c4e4466f3af1cf4af8dfa4 # main
    with:
      tag_name: ${{ inputs.notify_tag }}
    secrets:
      DISCORD_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}
