name: Dev Pre-release (semantic-release)

on:
  push:
    branches: [main, 'v1']

jobs:
  dev-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup node v24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Corepack pnpm
        run: |
          corepack enable

      - name: Install dependencies
        run: |
          pnpm install

      - name: Prepare semantic-release config
        run: |
          cat > .releaserc.json <<'EOF'
          {
            "branches": [
              "release",
              { "name": "v1", "prerelease": "dev" }
            ],
            "plugins": [
              [
                "@semantic-release/commit-analyzer",
                {
                  "preset": "angular",
                  "releaseRules": [
                    { "type": "refactor", "release": "patch" },
                    { "type": "build", "release": "patch" }
                  ]
                }
              ],
              [
                "@semantic-release/npm",
                { "npmPublish": false }
              ],
              "@semantic-release/release-notes-generator"
            ]
          }
          EOF

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker login
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build & push dev Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-indexer:dev
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-indexer:v${{ steps.semantic.outputs.new_release_major_version }}-dev
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-indexer:v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}-dev
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-indexer:v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}.${{ steps.semantic.outputs.new_release_patch_version }}
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-indexer:v${{ steps.semantic.outputs.new_release_version }}

      - name: Set up Helm
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5

      - name: Log in to Docker Hub Helm Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "${{ secrets.DOCKER_HUB_PWD }}" | helm registry login -u "${{ secrets.DOCKER_HUB_LOGIN }}" --password-stdin docker.io

      - name: Push Helm chart to Docker Hub OCI repo
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          TAGS=(
            "v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}-dev"
            "v${{ steps.semantic.outputs.new_release_version }}"
          )
          for tag in "${TAGS[@]}"; do
            sed -i "s/^version:.*/version: $tag/" ./charts/Chart.yaml
            CHART_NAME=$(grep '^name:' ./charts/Chart.yaml | awk '{print $2}')
            helm dependency update ./charts
            helm package ./charts --version $tag -d ./charts
            helm push ./charts/$CHART_NAME-$tag.tgz oci://docker.io/"${{ secrets.DOCKER_HUB_LOGIN }}"
          done

      - name: Publish Summary
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:dev" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:v${{ steps.semantic.outputs.new_release_major_version }}-dev" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}-dev" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}.${{ steps.semantic.outputs.new_release_patch_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:v${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Helm Charts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}-dev" >> $GITHUB_STEP_SUMMARY
          echo "- verana-indexer:v${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
